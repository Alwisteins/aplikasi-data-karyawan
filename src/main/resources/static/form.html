<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Data Pribadi</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="app-header">
    <div class="container-fluid px-4">
        <span class="app-header-title">
            <i class="bi bi-person-fill"></i> Aplikasi Data Pribadi
        </span>
    </div>
</header>

<div class="container form-card">
    <div class="card shadow-sm">
        <div class="card-header">
            <i class="bi bi-person-vcard"></i>
            <span id="formTitle">Form Data Pribadi</span>
        </div>
        <div class="card-body p-4">
            <form id="formDataPribadi" novalidate>

                <div class="mb-3">
                    <label for="nik" class="form-label fw-semibold">NIK <span class="text-danger">*</span></label>
                    <input type="number" class="form-control" id="nik" name="nik" placeholder="Masukkan NIK">
                </div>

                <div class="mb-3">
                    <label for="namaLengkap" class="form-label fw-semibold">Nama Lengkap <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="namaLengkap" name="namaLengkap" placeholder="Masukkan nama lengkap">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Jenis Kelamin</label>
                    <div class="d-flex gap-4">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="jenisKelamin" id="radioLaki" value="Laki-laki">
                            <label class="form-check-label" for="radioLaki">Laki-laki</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="jenisKelamin" id="radioPerempuan" value="Perempuan">
                            <label class="form-check-label" for="radioPerempuan">Perempuan</label>
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="tanggalLahir" class="form-label fw-semibold">Tanggal Lahir</label>
                    <input type="date" class="form-control" id="tanggalLahir" name="tanggalLahir">
                </div>

                <div class="mb-3">
                    <label for="alamat" class="form-label fw-semibold">Alamat</label>
                    <textarea class="form-control" id="alamat" name="alamat" rows="4" placeholder="Masukkan alamat lengkap"></textarea>
                </div>

                <div class="mb-4">
                    <label for="negara" class="form-label fw-semibold">Negara</label>
                    <select class="form-select" id="negara" name="negara">
                        <option value="">-- Pilih Negara --</option>
                        <option>Indonesia</option>
                        <option>Malaysia</option>
                        <option>Singapura</option>
                        <option>Thailand</option>
                        <option>Filipina</option>
                        <option>Vietnam</option>
                        <option>Amerika Serikat</option>
                        <option>Inggris</option>
                        <option>Jepang</option>
                        <option>Korea Selatan</option>
                        <option>Australia</option>
                        <option>Jerman</option>
                        <option>Prancis</option>
                        <option>Belanda</option>
                        <option>Rusia</option>
                        <option>Argentina</option>
                        <option>Portugal</option>
                        <option>Brasil</option>
                        <option>India</option>
                        <option>China</option>
                    </select>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary" id="btnSimpan">
                        <i class="bi bi-floppy"></i> Simpan
                    </button>
                    <button type="submit" class="btn btn-warning" id="btnUbah" style="display:none;">
                        <i class="bi bi-pencil-square"></i> Ubah
                    </button>
                    <button type="button" class="btn btn-secondary" id="btnKembali">
                        <i class="bi bi-arrow-left"></i> Kembali
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>

<!-- Modal Alert -->
<div class="modal fade" id="modalAlert" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Perhatian</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="modalAlertBody"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" data-bs-dismiss="modal">OK</button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/utils.js"></script>
<script src="js/form.js"></script>
</body>
</html>
