<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Data Pribadi</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="app-header">
    <div class="container-fluid px-4">
        <span class="app-header-title">
            <i class="bi bi-person-fill"></i> Aplikasi Data Pribadi
        </span>
    </div>
</header>

<div class="container-fluid px-4 mt-4">
    <div class="card shadow-sm">
        <div class="card-body">
            <div id="successAlert" class="alert alert-success alert-dismissible fade show d-none" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i>
                <span id="successAlertMsg"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="d-flex align-items-center gap-2 mb-3 flex-wrap">
                <input type="text" id="inputNik" class="form-control filter-input" placeholder="Cari NIK...">
                <input type="text" id="inputNama" class="form-control filter-input" placeholder="Cari Nama...">
                <button class="btn btn-primary" id="btnSearch">
                    <i class="bi bi-search"></i> Search
                </button>
                <button class="btn btn-success ms-auto" id="btnAdd">
                    <i class="bi bi-plus-circle"></i> Add
                </button>
            </div>

            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle" id="tabelKaryawan">
                    <thead class="table-dark">
                        <tr>
                            <th>No</th>
                            <th>NIK</th>
                            <th>Nama Lengkap</th>
                            <th>Umur</th>
                            <th>Tanggal Lahir</th>
                            <th>Jenis Kelamin</th>
                            <th>Alamat</th>
                            <th>Negara</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="tbody">
                        <tr><td colspan="9" class="text-center">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="d-flex justify-content-between align-items-center mt-3" id="paginationArea" style="display:none!important;">
                <span id="paginationInfo" class="text-muted small"></span>
                <ul class="pagination pagination-sm mb-0" id="paginationControls"></ul>
            </div>
        </div>
    </div>
</div>

<!-- Modal Alert -->
<div class="modal fade" id="modalAlert" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Perhatian</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="modalAlertBody"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" data-bs-dismiss="modal">OK</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal Konfirmasi -->
<div class="modal fade" id="modalConfirm" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Konfirmasi</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="modalConfirmBody"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                <button type="button" class="btn btn-danger" id="btnConfirmYes">Hapus</button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/utils.js"></script>
<script src="js/monitoring.js"></script>
</body>
</html>
